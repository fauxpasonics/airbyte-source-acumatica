documentationUrl: https://docsurl.com
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: Acumatica Spec
  type: object
  required:
    - BASEURL
    - CLIENTID
    - CLIENTSECRET
    - USERNAME
    - PASSWORD
  properties:
    # 'TODO: This schema defines the configuration required for the source. This usually involves metadata such as database and/or authentication information.':
    BASEURL:
      type: string
      description: base URL for Acumatica instance
    TENANTNAME:
      type: string
      description: The tenant name for the Acumatica tenant (often entered after the Username below too)
    CLIENTID:
      type: string
      description: id used to distinguish client environment in Acumatica
    CLIENTSECRET:
      type: string
      description: unique key for user/environment in Acumatica
      airbyte_secret: true
    USERNAME:
      type: string
      description: username used to login to Acumatica
    PASSWORD:
      type: string
      description: user password to login to acumatica
      airbyte_secret: true
    PAGESIZE:
      type: number
      description: Number of records to fetch per page
      default: 1000
    STREAMSTODISABLEPAGING:
      type: array
      description: List of streams to disable paging for. If a stream is in this list, the connector will attempt to fetch all records from that stream in a single request. This is useful for streams that do not support paging or have a small number of records.
      items:
        type: string
    APIVERSION:
      type: string
      description: API version to use when connecting to Acumatica. If not specified, the connector will use the default API version.
      default: "24.200.001"
